name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Check flake
        run: nix flake check --no-build --allow-import-from-derivation

      - name: Build Anytype Heart
        run: nix build .#anytype-heart --print-build-logs

      - name: Build Anytype
        run: nix build .#anytype --print-build-logs
